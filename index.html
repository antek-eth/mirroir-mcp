<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacBook Pro Deals // Benchmark Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--bg2:#111114;--bg3:#18181c;--bg4:#222228;
  --fg:#e8e8ec;--fg2:#a0a0aa;--fg3:#68687a;
  --accent:#4ade80;--accent2:#22c55e;--accent-dim:rgba(74,222,128,.08);
  --hot:#ef4444;--warm:#f97316;--cold:#3b82f6;--frozen:#6366f1;
  --border:#2a2a32;--border2:#3a3a44;
  --font-mono:'JetBrains Mono',monospace;--font-sans:'DM Sans',sans-serif;
  --radius:6px;
}
html{font-size:13px;background:var(--bg);color:var(--fg);font-family:var(--font-sans)}
body{min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:300px;background:linear-gradient(180deg,rgba(74,222,128,.03) 0%,transparent 100%);pointer-events:none;z-index:0}

.container{max-width:1600px;margin:0 auto;padding:24px 20px;position:relative;z-index:1}

/* Header */
header{display:flex;align-items:flex-end;justify-content:space-between;padding:20px 0 32px;border-bottom:1px solid var(--border);margin-bottom:24px}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:14px;color:var(--bg)}
h1{font-family:var(--font-mono);font-size:22px;font-weight:600;letter-spacing:-.5px;color:var(--fg)}
h1 span{color:var(--accent);font-weight:300}
.header-meta{font-family:var(--font-mono);font-size:11px;color:var(--fg3);text-align:right;line-height:1.6}
.header-meta strong{color:var(--fg2)}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--fg3);white-space:nowrap}
.chip-filters{display:flex;gap:4px;flex-wrap:wrap}
.chip-btn{font-family:var(--font-mono);font-size:11px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--fg2);border-radius:100px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip-btn:hover{border-color:var(--fg3);color:var(--fg)}
.chip-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
select.filter-select{font-family:var(--font-mono);font-size:11px;padding:4px 8px;border:1px solid var(--border);background:var(--bg2);color:var(--fg2);border-radius:var(--radius);cursor:pointer;appearance:auto}
select.filter-select:focus{outline:none;border-color:var(--accent)}
input.filter-input{font-family:var(--font-mono);font-size:11px;padding:4px 8px;border:1px solid var(--border);background:var(--bg2);color:var(--fg);border-radius:var(--radius);width:120px}
input.filter-input:focus{outline:none;border-color:var(--accent)}
input.filter-input::placeholder{color:var(--fg3)}
.divider{width:1px;height:20px;background:var(--border);margin:0 8px}
.results-count{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-left:auto}
.results-count strong{color:var(--accent)}

/* View toggle */
.view-toggle{display:flex;gap:2px;background:var(--bg2);border-radius:var(--radius);padding:2px;border:1px solid var(--border)}
.view-btn{font-family:var(--font-mono);font-size:10px;padding:4px 10px;border:none;background:transparent;color:var(--fg3);cursor:pointer;border-radius:4px;transition:all .15s}
.view-btn.active{background:var(--bg4);color:var(--fg)}

/* Sort bar */
.sort-bar{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sort-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--fg3);margin-right:4px}
.sort-btn{font-family:var(--font-mono);font-size:10px;padding:3px 8px;border:1px solid transparent;background:transparent;color:var(--fg3);border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap}
.sort-btn:hover{color:var(--fg2)}
.sort-btn.active{border-color:var(--border2);color:var(--accent);background:var(--accent-dim)}
.sort-btn .arrow{margin-left:3px;font-size:9px}

/* Cards grid view */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.deal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.deal-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.deal-card.expired{opacity:.6}
.deal-card.expired:hover{opacity:.85}

.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
.card-chip{font-family:var(--font-mono);font-size:13px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap}
.card-chip.m1{background:rgba(99,102,241,.15);color:#818cf8}
.card-chip.m2{background:rgba(59,130,246,.15);color:#60a5fa}
.card-chip.m3{background:rgba(34,197,94,.15);color:#4ade80}
.card-chip.m4{background:rgba(249,115,22,.15);color:#fb923c}
.card-chip.m5{background:rgba(239,68,68,.15);color:#f87171}
.card-temp{font-family:var(--font-mono);font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px}
.card-temp.hot{color:var(--hot)}
.card-temp.warm{color:var(--warm)}
.card-temp.cold{color:var(--cold)}
.card-temp.frozen{color:var(--frozen)}
.card-temp.neutral{color:var(--fg3)}
.temp-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.temp-dot.hot{background:var(--hot)}
.temp-dot.warm{background:var(--warm)}
.temp-dot.cold{background:var(--cold)}
.temp-dot.frozen{background:var(--frozen)}
.temp-dot.neutral{background:var(--fg3)}

.card-model{font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--fg);margin-bottom:4px;line-height:1.3}
.card-specs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.spec-tag{font-family:var(--font-mono);font-size:10px;padding:2px 6px;background:var(--bg3);border-radius:3px;color:var(--fg2)}

.card-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.card-price{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--fg)}
.card-old-price{font-family:var(--font-mono);font-size:12px;color:var(--fg3);text-decoration:line-through}
.card-discount{font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:600}

/* Benchmark bars */
.bench-section{margin-top:8px;padding-top:10px;border-top:1px solid var(--border)}
.bench-section-title{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--fg3);margin-bottom:8px}
.bench-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bench-label{font-family:var(--font-mono);font-size:10px;color:var(--fg3);width:56px;flex-shrink:0;text-align:right}
.bench-bar-bg{flex:1;height:14px;background:var(--bg);border-radius:2px;overflow:hidden;position:relative}
.bench-bar{height:100%;border-radius:2px;transition:width .4s ease;min-width:2px}
.bench-bar.cpu{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.bench-bar.gpu{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
.bench-bar.metal{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.bench-bar.ai{background:linear-gradient(90deg,#10b981,#34d399)}
.bench-bar.llm{background:linear-gradient(90deg,#ec4899,#f472b6)}
.bench-value{font-family:var(--font-mono);font-size:10px;color:var(--fg2);width:46px;flex-shrink:0}

.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.card-date{font-family:var(--font-mono);font-size:10px;color:var(--fg3)}
.card-link{font-family:var(--font-mono);font-size:10px;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:4px;transition:opacity .15s}
.card-link:hover{opacity:.7}

/* Table view */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius)}
table.deals-table{width:100%;border-collapse:collapse;font-size:11px}
table.deals-table th{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--fg3);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;cursor:pointer;white-space:nowrap;user-select:none}
table.deals-table th:hover{color:var(--fg2)}
table.deals-table th.sorted{color:var(--accent)}
table.deals-table td{padding:6px 10px;border-bottom:1px solid var(--border);font-family:var(--font-mono);color:var(--fg2);white-space:nowrap}
table.deals-table tr:hover td{background:var(--bg2)}
table.deals-table tr.expired td{opacity:.5}
table.deals-table tr:hover.expired td{opacity:.8}
td.price-cell{font-weight:600;color:var(--fg)}
td.temp-cell{font-weight:500}
td a{color:var(--accent);text-decoration:none}
td a:hover{text-decoration:underline}

/* Detail panel */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.detail-overlay.open{display:flex}
.detail-panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:90%;max-width:720px;max-height:90vh;overflow-y:auto;padding:28px;position:relative}
.detail-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border:1px solid var(--border);background:transparent;color:var(--fg3);border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.detail-close:hover{border-color:var(--fg3);color:var(--fg)}
.detail-chip-badge{display:inline-block;font-family:var(--font-mono);font-size:14px;font-weight:600;padding:4px 12px;border-radius:6px;margin-bottom:12px}
.detail-title{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:6px}
.detail-subtitle{font-family:var(--font-mono);font-size:12px;color:var(--fg3);margin-bottom:20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-stat{background:var(--bg3);border-radius:var(--radius);padding:12px}
.detail-stat-label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--fg3);margin-bottom:4px}
.detail-stat-value{font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--fg)}
.detail-stat-value small{font-size:11px;font-weight:400;color:var(--fg3);margin-left:4px}
.detail-bench-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.detail-bench{background:var(--bg3);border-radius:var(--radius);padding:10px}
.detail-bench-label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--fg3);margin-bottom:4px}
.detail-bench-val{font-family:var(--font-mono);font-size:16px;font-weight:600}
.detail-section-title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--fg3);margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border)}
.detail-cta{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12px;padding:8px 16px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);cursor:pointer;font-weight:600;text-decoration:none;transition:opacity .15s;margin-top:16px}
.detail-cta:hover{opacity:.85}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--fg3);font-family:var(--font-mono)}
.empty-state .icon{font-size:32px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:13px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--fg3)}

@media(max-width:768px){
  header{flex-direction:column;align-items:flex-start;gap:12px}
  .header-meta{text-align:left}
  .cards-grid{grid-template-columns:1fr}
  .filters{gap:6px}
  .divider{display:none}
  .detail-grid{grid-template-columns:1fr}
  .detail-bench-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

</div>

"gb6_metal": 79321, "ai_cpu_sp": 4069, "ai_cpu_hp": 7074, "ai_cpu_q": 5726, "ai_gpu_sp": 8061, "ai_gpu_hp": 9270, "ai_gpu_q": 8528, "ai_npu_sp": 4065, "ai_npu_hp": 30662, "ai_npu_q": 34379, "price": "", "oldPrice": "8 999 zł", "datePosted": "Wygasło 9 kwi 2025", "temperature": "170°", "title": "", "url": "", "mem_bw_gbs": 150, "llm_gpu_cores": 18, "llama2_7b_q4_tg": 30.74, "llama2_7b_q4_pp": 341.67, "llama2_7b_q8_tg": 17.53, "llama2_7b_f16_tg": 9.89}, {"model": "MacBook Pro M4", "ram": "16GB", "disk": "512GB", "cpu": "M4", "cpuCores": "", "gpu": "", "gb6_single": 3793, "gb6_multi": 14921, "gb6_metal": 57398, "ai_cpu_sp": 4674, "ai_cpu_hp": 7640, "ai_cpu_q": 6139, "ai_gpu_sp": 9018, "ai_gpu_hp": 10659, "ai_gpu_q": 9249, "ai_npu_sp": 4537, "ai_npu_hp": 33067, "ai_npu_q": 45713, "price": "", "oldPrice": "7 500 zł", "datePosted": "Wygasło 9 kwi 2025", "temperature": "194°", "title": "", "url": "", "mem_bw_gbs": 120, "llm_gpu_cores": 10, "llama2_7b_q4_tg": 24.11, "llama2_7b_q4_pp": 221.29, "llama2_7b_q8_tg": 13.54, "llama2_7b_f16_tg": 7.43}];</script>
<script>
let DATA = [];
let filtered = [];
let currentSort = { key: 'temperature', dir: 'desc' };
let currentView = 'cards';
let activeChips = new Set();
let activeTiers = new Set();

const SORT_OPTIONS = [
  { key: 'priceNum', label: 'Price' },
  { key: 'temperature', label: 'Temp' },
  { key: 'gb6_single', label: 'GB6 SC' },
  { key: 'gb6_multi', label: 'GB6 MC' },
  { key: 'gb6_metal', label: 'Metal' },
  { key: 'ai_npu_q', label: 'AI NPU' },
  { key: 'mem_bw_gbs', label: 'Mem BW' },
  { key: 'llm_q4_num', label: 'LLM Q4' },
];

const MAX_GB6_SINGLE = 4300;
const MAX_GB6_MULTI = 30000;
const MAX_METAL = 230000;
const MAX_AI_NPU = 58000;
const MAX_LLM = 95;
const MAX_BW = 620;

function parsePrice(p) {
  if (!p) return Infinity;
  const n = parseInt(p.replace(/\s/g, '').replace('zł', ''));
  return isNaN(n) ? Infinity : n;
}
function parseTemp(t) {
  if (!t) return 0;
  const n = parseInt(t.replace('°', '').replace(/\s/g, ''));
  return isNaN(n) ? 0 : n;
}
function parseLLM(v) {
  if (!v && v !== 0) return 0;
  const s = String(v);
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function chipGen(cpu) { return cpu.match(/M(\d)/)?.[1] || '0'; }
function chipTier(cpu) {
  if (/MAX/.test(cpu)) return 'MAX';
  if (/PRO/.test(cpu)) return 'PRO';
  return 'Base';
}
function chipClass(cpu) { return 'm' + chipGen(cpu); }
function tempClass(t) {
  const n = parseTemp(t);
  if (n >= 400) return 'hot';
  if (n >= 100) return 'warm';
  if (n >= 0) return 'neutral';
  if (n >= -100) return 'cold';
  return 'frozen';
}
function isExpired(d) {
  return /wygasł/i.test(d.datePosted);
}
function fmtNum(n) {
  if (!n && n !== 0) return '-';
  return Number(n).toLocaleString('pl-PL');
}
function pct(val, max) { return Math.min(100, Math.max(1, (val / max) * 100)); }
function discount(price, old) {
  const p = parsePrice(price), o = parsePrice(old);
  if (o === Infinity || p === Infinity || o <= p) return '';
  return '-' + Math.round((1 - p / o) * 100) + '%';
}

function initFilters() {
  const chips = [...new Set(DATA.map(d => 'M' + chipGen(d.cpu)))].sort();
  const tiers = [...new Set(DATA.map(d => chipTier(d.cpu)))].sort((a,b) => {
    const order = { Base: 0, PRO: 1, MAX: 2 };
    return (order[a]||0) - (order[b]||0);
  });
  const rams = [...new Set(DATA.map(d => d.ram).filter(Boolean))].sort((a,b) => parseInt(a)-parseInt(b));
  const disks = [...new Set(DATA.map(d => d.disk).filter(Boolean))].sort((a,b) => {
    const va = a.includes('TB') ? parseInt(a)*1024 : parseInt(a);
    const vb = b.includes('TB') ? parseInt(b)*1024 : parseInt(b);
    return va - vb;
  });

  const chipEl = document.getElementById('chipFilters');
  chips.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip-btn';
    btn.textContent = c;
    btn.onclick = () => { btn.classList.toggle('active'); activeChips.has(c) ? activeChips.delete(c) : activeChips.add(c); applyFilters(); };
    chipEl.appendChild(btn);
  });
  const tierEl = document.getElementById('tierFilters');
  tiers.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'chip-btn';
    btn.textContent = t;
    btn.onclick = () => { btn.classList.toggle('active'); activeTiers.has(t) ? activeTiers.delete(t) : activeTiers.add(t); applyFilters(); };
    tierEl.appendChild(btn);
  });
  const ramSel = document.getElementById('ramFilter');
  rams.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; ramSel.appendChild(o); });
  const diskSel = document.getElementById('diskFilter');
  disks.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; diskSel.appendChild(o); });

  ramSel.onchange = diskSel.onchange = applyFilters;
  document.getElementById('priceMax').oninput = applyFilters;
  document.getElementById('searchInput').oninput = applyFilters;

  // Sort buttons
  const sortBar = document.getElementById('sortBar');
  SORT_OPTIONS.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'sort-btn' + (currentSort.key === opt.key ? ' active' : '');
    btn.innerHTML = opt.label + '<span class="arrow">' + (currentSort.key === opt.key ? (currentSort.dir === 'desc' ? '&#9660;' : '&#9650;') : '') + '</span>';
    btn.onclick = () => {
      if (currentSort.key === opt.key) currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
      else { currentSort.key = opt.key; currentSort.dir = 'desc'; }
      applyFilters();
    };
    sortBar.appendChild(btn);
  });

  // View toggle
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      render();
    };
  });
}

function applyFilters() {
  const ram = document.getElementById('ramFilter').value;
  const disk = document.getElementById('diskFilter').value;
  const maxPrice = parseInt(document.getElementById('priceMax').value.replace(/\s/g, '')) || Infinity;
  const search = document.getElementById('searchInput').value.toLowerCase();

  filtered = DATA.filter(d => {
    if (activeChips.size && !activeChips.has('M' + chipGen(d.cpu))) return false;
    if (activeTiers.size && !activeTiers.has(chipTier(d.cpu))) return false;
    if (ram && d.ram !== ram) return false;
    if (disk && d.disk !== disk) return false;
    if (parsePrice(d.price) > maxPrice) return false;
    if (search && !d.title.toLowerCase().includes(search) && !d.model.toLowerCase().includes(search)) return false;
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    let va, vb;
    if (currentSort.key === 'priceNum') { va = parsePrice(a.price); vb = parsePrice(b.price); }
    else if (currentSort.key === 'temperature') { va = parseTemp(a.temperature); vb = parseTemp(b.temperature); }
    else if (currentSort.key === 'llm_q4_num') { va = parseLLM(a.llama2_7b_q4_tg); vb = parseLLM(b.llama2_7b_q4_tg); }
    else { va = a[currentSort.key] || 0; vb = b[currentSort.key] || 0; }
    return currentSort.dir === 'desc' ? vb - va : va - vb;
  });

  // Update sort buttons
  document.querySelectorAll('.sort-btn').forEach((btn, i) => {
    const opt = SORT_OPTIONS[i];
    btn.className = 'sort-btn' + (currentSort.key === opt.key ? ' active' : '');
    btn.innerHTML = opt.label + '<span class="arrow">' + (currentSort.key === opt.key ? (currentSort.dir === 'desc' ? ' &#9660;' : ' &#9650;') : '') + '</span>';
  });

  document.getElementById('resultsCount').innerHTML = '<strong>' + filtered.length + '</strong> / ' + DATA.length + ' deals';
  render();
}

function renderCards() {
  const container = document.getElementById('cardsView');
  if (!filtered.length) { container.innerHTML = '<div class="empty-state"><div class="icon">&#9679;</div><p>No deals match your filters</p></div>'; return; }
  container.innerHTML = filtered.map((d, i) => {
    const tc = tempClass(d.temperature);
    const exp = isExpired(d);
    const disc = discount(d.price, d.oldPrice);
    const llmVal = parseLLM(d.llama2_7b_q4_tg);
    return `
    <div class="deal-card${exp ? ' expired' : ''}" onclick="showDetail(${i})">
      <div class="card-header">
        <span class="card-chip ${chipClass(d.cpu)}">${d.cpu}</span>
        <span class="card-temp ${tc}"><span class="temp-dot ${tc}"></span>${d.temperature || '-'}</span>
      </div>
      <div class="card-model">${d.model}</div>
      <div class="card-specs">
        ${d.ram ? `<span class="spec-tag">${d.ram}</span>` : ''}
        ${d.disk ? `<span class="spec-tag">${d.disk}</span>` : ''}
        ${d.cpuCores ? `<span class="spec-tag">${d.cpuCores} CPU</span>` : ''}
        ${d.gpu ? `<span class="spec-tag">${d.gpu} GPU</span>` : ''}
        ${d.mem_bw_gbs ? `<span class="spec-tag">${d.mem_bw_gbs} GB/s</span>` : ''}
      </div>
      <div class="card-price-row">
        <span class="card-price">${d.price || 'N/A'}</span>
        ${d.oldPrice ? `<span class="card-old-price">${d.oldPrice}</span>` : ''}
        ${disc ? `<span class="card-discount">${disc}</span>` : ''}
      </div>
      <div class="bench-section">
        <div class="bench-section-title">Geekbench 6</div>
        <div class="bench-row">
          <span class="bench-label">SC</span>
          <div class="bench-bar-bg"><div class="bench-bar cpu" style="width:${pct(d.gb6_single, MAX_GB6_SINGLE)}%"></div></div>
          <span class="bench-value">${fmtNum(d.gb6_single)}</span>
        </div>
        <div class="bench-row">
          <span class="bench-label">MC</span>
          <div class="bench-bar-bg"><div class="bench-bar cpu" style="width:${pct(d.gb6_multi, MAX_GB6_MULTI)}%"></div></div>
          <span class="bench-value">${fmtNum(d.gb6_multi)}</span>
        </div>
        <div class="bench-row">
          <span class="bench-label">Metal</span>
          <div class="bench-bar-bg"><div class="bench-bar metal" style="width:${pct(d.gb6_metal, MAX_METAL)}%"></div></div>
          <span class="bench-value">${fmtNum(d.gb6_metal)}</span>
        </div>
      </div>
      <div class="bench-section">
        <div class="bench-section-title">LLM / AI</div>
        <div class="bench-row">
          <span class="bench-label">Q4 t/s</span>
          <div class="bench-bar-bg"><div class="bench-bar llm" style="width:${pct(llmVal, MAX_LLM)}%"></div></div>
          <span class="bench-value">${d.llama2_7b_q4_tg || '-'}</span>
        </div>
        <div class="bench-row">
          <span class="bench-label">NPU Q</span>
          <div class="bench-bar-bg"><div class="bench-bar ai" style="width:${pct(d.ai_npu_q, MAX_AI_NPU)}%"></div></div>
          <span class="bench-value">${fmtNum(d.ai_npu_q)}</span>
        </div>
      </div>
      <div class="card-footer">
        <span class="card-date">${d.datePosted}</span>
        <a class="card-link" href="${d.url}" target="_blank" onclick="event.stopPropagation()">pepper.pl &#8599;</a>
      </div>
    </div>`;
  }).join('');
}

function renderTable() {
  const wrap = document.getElementById('tableView');
  if (!filtered.length) { wrap.innerHTML = '<div class="empty-state"><div class="icon">&#9679;</div><p>No deals match your filters</p></div>'; return; }
  const llmVal = d => parseLLM(d.llama2_7b_q4_tg);
  wrap.innerHTML = `<table class="deals-table"><thead><tr>
    <th>Chip</th><th>Model</th><th>RAM</th><th>Disk</th>
    <th>Price</th><th>Temp</th>
    <th>GB6 SC</th><th>GB6 MC</th><th>Metal</th>
    <th>Mem BW</th><th>Q4 t/s</th><th>NPU Q</th>
    <th>Date</th><th>Link</th>
  </tr></thead><tbody>${filtered.map((d, i) => {
    const tc = tempClass(d.temperature);
    const exp = isExpired(d);
    return `<tr class="${exp ? 'expired' : ''}" style="cursor:pointer" onclick="showDetail(${i})">
      <td><span class="card-chip ${chipClass(d.cpu)}" style="font-size:10px;padding:1px 6px">${d.cpu}</span></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${d.model}</td>
      <td>${d.ram||'-'}</td><td>${d.disk||'-'}</td>
      <td class="price-cell">${d.price||'-'}</td>
      <td class="temp-cell ${tc}">${d.temperature||'-'}</td>
      <td>${fmtNum(d.gb6_single)}</td><td>${fmtNum(d.gb6_multi)}</td><td>${fmtNum(d.gb6_metal)}</td>
      <td>${d.mem_bw_gbs||'-'} GB/s</td>
      <td>${d.llama2_7b_q4_tg||'-'}</td>
      <td>${fmtNum(d.ai_npu_q)}</td>
      <td style="font-size:10px;color:var(--fg3)">${d.datePosted}</td>
      <td><a href="${d.url}" target="_blank" onclick="event.stopPropagation()">&#8599;</a></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function render() {
  document.getElementById('cardsView').style.display = currentView === 'cards' ? 'grid' : 'none';
  document.getElementById('tableView').style.display = currentView === 'table' ? 'block' : 'none';
  if (currentView === 'cards') renderCards();
  else renderTable();
}

function showDetail(idx) {
  const d = filtered[idx];
  if (!d) return;
  const tc = tempClass(d.temperature);
  const disc = discount(d.price, d.oldPrice);
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <span class="detail-chip-badge card-chip ${chipClass(d.cpu)}">${d.cpu}</span>
    <div class="detail-title">${d.title}</div>
    <div class="detail-subtitle">${d.datePosted} &middot; <span class="card-temp ${tc}" style="display:inline">${d.temperature}</span></div>
    <div class="detail-grid">
      <div class="detail-stat">
        <div class="detail-stat-label">Price</div>
        <div class="detail-stat-value">${d.price || 'N/A'}${disc ? `<small>${disc}</small>` : ''}${d.oldPrice ? `<br><span style="font-size:12px;color:var(--fg3);text-decoration:line-through">${d.oldPrice}</span>` : ''}</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-label">Config</div>
        <div class="detail-stat-value" style="font-size:14px">${d.ram || '?'} / ${d.disk || '?'}<small>${d.cpuCores ? ' &middot; ' + d.cpuCores + ' CPU' : ''}${d.gpu ? ' &middot; ' + d.gpu + ' GPU' : ''}</small></div>
      </div>
    </div>
    <div class="detail-section-title">Geekbench 6</div>
    <div class="detail-bench-grid">
      <div class="detail-bench"><div class="detail-bench-label">Single-Core</div><div class="detail-bench-val" style="color:#60a5fa">${fmtNum(d.gb6_single)}</div></div>
      <div class="detail-bench"><div class="detail-bench-label">Multi-Core</div><div class="detail-bench-val" style="color:#60a5fa">${fmtNum(d.gb6_multi)}</div></div>
      <div class="detail-bench"><div class="detail-bench-label">Metal GPU</div><div class="detail-bench-val" style="color:#fbbf24">${fmtNum(d.gb6_metal)}</div></div>
    </div>
    <div class="detail-section-title">Geekbench AI (NPU / Neural Engine)</div>
    <div class="detail-bench-grid">
      <div class="detail-bench"><div class="detail-bench-label">Single Prec</div><div class="detail-bench-val" style="color:#34d399">${fmtNum(d.ai_npu_sp)}</div></div>
      <div class="detail-bench"><div class="detail-bench-label">Half Prec</div><div class="detail-bench-val" style="color:#34d399">${fmtNum(d.ai_npu_hp)}</div></div>
      <div class="detail-bench"><div class="detail-bench-label">Quantized</div><div class="detail-bench-val" style="color:#34d399">${fmtNum(d.ai_npu_q)}</div></div>
    </div>
    <div class="detail-section-title">Geekbench AI (GPU)</div>
    <div class="detail-bench-grid">
      <div class="detail-bench"><div class="detail-bench-label">Single Prec</div><div class="detail-bench-val" style="color:#a78bfa">${fmtNum(d.ai_gpu_sp)}</div></div>
      <div class="detail-bench"><div class="detail-bench-label">Half Prec</div><div class="detail-bench-val" style="color:#a78bfa">${fmtNum(d.ai_gpu_hp)}</div></div>
      <div class="detail-bench"><div class="detail-bench-label">Quantized</div><div class="detail-bench-val" style="color:#a78bfa">${fmtNum(d.ai_gpu_q)}</div></div>
    </div>
    <div class="detail-section-title">LLM Inference (Llama 2 7B)</div>
    <div class="detail-grid">
      <div class="detail-stat">
        <div class="detail-stat-label">Mem Bandwidth</div>
        <div class="detail-stat-value">${d.mem_bw_gbs || '-'}<small>GB/s</small></div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-label">GPU Cores</div>
        <div class="detail-stat-value">${d.llm_gpu_cores || '-'}</div>
      </div>
    </div>
    <div class="detail-bench-grid" style="grid-template-columns:1fr 1fr">
      <div class="detail-bench"><div class="detail-bench-label">Q4 Token Gen</div><div class="detail-bench-val" style="color:#f472b6">${d.llama2_7b_q4_tg || '-'}<small> t/s</small></div></div>
      <div class="detail-bench"><div class="detail-bench-label">Q4 Prompt</div><div class="detail-bench-val" style="color:#f472b6">${d.llama2_7b_q4_pp || '-'}<small> t/s</small></div></div>
      <div class="detail-bench"><div class="detail-bench-label">Q8 Token Gen</div><div class="detail-bench-val" style="color:#f472b6">${d.llama2_7b_q8_tg || '-'}<small> t/s</small></div></div>
      <div class="detail-bench"><div class="detail-bench-label">F16 Token Gen</div><div class="detail-bench-val" style="color:#f472b6">${d.llama2_7b_f16_tg || '-'}<small> t/s</small></div></div>
    </div>
    <a class="detail-cta" href="${d.url}" target="_blank">View on Pepper.pl &#8599;</a>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}
document.getElementById('detailOverlay').onclick = e => { if (e.target === e.currentTarget) closeDetail(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

async function init() {
  try {
    const res = await fetch('macbook_pro_pepper_benchmarks.json');
    DATA = await res.json();
  } catch(e) {
    DATA = EMBEDDED_DATA;
  }
  DATA.forEach(d => {
    d.priceNum = parsePrice(d.price);
    d.tempNum = parseTemp(d.temperature);
    d.llm_q4_num = parseLLM(d.llama2_7b_q4_tg);
  });
  document.getElementById('dataInfo').innerHTML = '<strong>' + DATA.length + '</strong> deals &middot; scraped from pepper.pl';
  initFilters();
  applyFilters();
}

init();
</script>
</body>
</html>
